<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Atlas — an interactive educational hub</title>
<link rel="stylesheet" href="core/theme.css">
<style>
  body{overflow:auto}
  .hub{max-width:1080px;margin:0 auto;padding:56px 24px 80px}
  .hub-head{text-align:center;margin-bottom:44px}
  .hub-head .eyebrow{font-family:var(--ui);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:12px}
  .hub-head h1{font-family:var(--serif);font-size:46px;line-height:1.05;margin:0 0 14px;letter-spacing:-.01em}
  .hub-head p{font-family:var(--ui);font-size:16px;line-height:1.6;color:var(--muted);max-width:620px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .card{display:flex;flex-direction:column;gap:10px;background:var(--panel);border:1px solid var(--rule);
    border-radius:16px;padding:22px 22px 20px;text-decoration:none;color:var(--ink);position:relative;
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease}
  a.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 14px 34px rgba(0,0,0,.12)}
  .card .icon{font-size:30px;line-height:1}
  .card h2{font-family:var(--serif);font-size:22px;margin:2px 0 0}
  .card p{font-family:var(--ui);font-size:13.5px;line-height:1.55;color:var(--muted);margin:0;flex:1}
  .card .meta{font-family:var(--ui);font-size:11.5px;color:var(--faint);letter-spacing:.02em}
  .card .go{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--accent)}
  .card.soon{opacity:.62;cursor:default}
  .badge{position:absolute;top:16px;right:16px;font-family:var(--ui);font-size:10px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--rule2);
    border-radius:20px;padding:3px 9px}
  .badge.live{color:var(--good);border-color:var(--good)}
  .hub-foot{text-align:center;margin-top:48px;font-family:var(--ui);font-size:12.5px;color:var(--faint)}
</style>
</head>
<body>
  <main class="hub">
    <header class="hub-head">
      <div class="eyebrow">Learning Atlas</div>
      <h1>An interactive educational hub</h1>
      <p>Explore subjects through maps, diagrams and interactive models — click anything to dig deeper, and test yourself as you go.</p>
    </header>

    <section class="grid" id="grid" aria-label="Subjects"></section>

    <footer class="hub-foot">Built as a data-driven, buildless web app</footer>
  </main>

<script>
  /* Render the subject cards from the manifest, so adding a subject is a data
     change in subjects.json — no HTML edits. Served over HTTP (python http.server
     / GitHub Pages), where fetch of a same-origin file works. */
  (function () {
    const grid = document.getElementById('grid');
    const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    function card(s) {
      const inner = `
        <span class="badge${s.status === 'live' ? ' live' : ''}">${s.status === 'live' ? 'Live' : 'Coming soon'}</span>
        <span class="icon">${esc(s.icon)}</span>
        <h2>${esc(s.name)}</h2>
        <p>${esc(s.description)}</p>
        <span class="meta">${esc(s.meta)}</span>
        ${s.status === 'live' ? '<span class="go">Open explorer →</span>' : ''}`;
      if (s.status === 'live' && s.href) {
        const a = document.createElement('a'); a.className = 'card'; a.href = s.href; a.innerHTML = inner; return a;
      }
      const d = document.createElement('div'); d.className = 'card soon'; d.innerHTML = inner; return d;
    }
    fetch('subjects.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => (data.subjects || []).forEach(s => grid.appendChild(card(s))))
      .catch(() => {
        grid.innerHTML = '<p class="note" style="grid-column:1/-1">Couldn’t load subjects.json. ' +
          'Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) rather than opening the file directly.</p>';
      });
  })();
</script>
</body>
</html>
